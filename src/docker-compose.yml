services:
  bge:
    build:
      context: .
      dockerfile: BrowserGameEngine.FrontendServer/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Bge__DevAuth=true
      - Discord__ClientId=${DISCORD_CLIENT_ID}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET}
      # To use S3 storage instead of local file storage:
      # - Bge__S3BucketName=my-bge-bucket
      # - AWS_REGION=eu-central-1
    volumes:
      - bge-storage:/app/storage

volumes:
  bge-storage:
