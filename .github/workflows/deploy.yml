name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: bge
  ECS_CLUSTER: bge
  ECS_SERVICE: bge

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: nuget-
      - name: Build & Test
        working-directory: src
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test --no-restore --verbosity normal \
            --collect "XPlat Code Coverage" \
            --results-directory ./coverage
      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.4
        with:
          reports: src/coverage/**/coverage.cobertura.xml
          targetdir: src/coverage/report
          reporttypes: MarkdownSummaryGithub;Cobertura
      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: src/coverage/report/SummaryGithub.md
      - name: Check coverage threshold
        working-directory: src
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys, glob

          files = glob.glob("coverage/report/Cobertura.xml")
          if not files:
              print("No Cobertura report found; skipping threshold check.")
              sys.exit(0)

          tree = ET.parse(files[0])
          root = tree.getroot()
          line_rate = float(root.attrib.get("line-rate", 0))
          pct = round(line_rate * 100, 1)
          threshold = 58.0

          print(f"Line coverage: {pct:.1f}% (threshold: {threshold}%)")
          if pct < threshold:
              print(f"ERROR: Coverage {pct:.1f}% is below threshold {threshold}%")
              sys.exit(1)
          EOF

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        working-directory: src
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          docker build --build-arg COMMIT_SHA=$IMAGE_TAG --build-arg VITE_SENTRY_DSN="$SENTRY_DSN" -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f BrowserGameEngine.FrontendServer/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
